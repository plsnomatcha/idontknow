<!DOCTYPE html>
<html lang="en">

<head>
    
    <meta charset="UTF-8">
    
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Cat Scene</title>
    
    <link rel="stylesheet" href="style.css">
    
</head>

<body>
    
    <div id="app">
        
        <!-- LOADING SCREEN -->
        <div id="loadingScreen" class="screen">
            
            <img src="meow.png" id="loadingGif">
            
        </div>
        
        
        
        <!-- MAIN SCREEN -->
        <div id="mainScreen" class="screen">
            
            <!-- CATS -->
            <img src="cat1.png" id="cat1" class="draggable">
            
            <img src="cat2.png" id="cat2" class="draggable">
            
            
            
            <!-- PLAYER -->
            <img src="headset.png" id="headset" class="draggable">
            
            <img src="tape.png" id="tape" class="draggable">
            
            
            
            <!-- CD -->
            <img src="cd1.png" id="disctape" class="draggable">
            
            
            
            <!-- AUDIO -->
            <audio id="player" preload="auto"></audio>
            
        </div>
        
    </div>
    
    <script src="script.js"></script>
    
</body>

</html>
